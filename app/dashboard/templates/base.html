<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Dashboard Deteksi Cyberbullying{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Final Project Moderation Dashboard</p>
                <h1>{% block page_title %}Dashboard Deteksi Cyberbullying{% endblock %}</h1>
                <p class="subtext">Pemantauan moderasi Discord berbasis regular expression dan finite automata.</p>
            </div>
            <nav class="topnav">
                <a href="{{ url_for('index') }}" class="nav-link {% if request.path == '/' %}active{% endif %}">Ringkasan</a>
                <a href="{{ url_for('messages') }}" class="nav-link {% if request.path == '/messages' %}active{% endif %}">Log Pesan</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
